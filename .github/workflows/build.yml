# 构建并验证 IntelliJ 插件（可用于 PR / push 时自动测试）
name: Build Plugin

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build plugin with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5
          arguments: buildPlugin --no-daemon

      - name: Verify plugin compatibility (Plugin Verifier)
        id: verify
        uses: ChrisCarini/intellij-platform-plugin-verifier-action@v2.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          plugin-location: build/distributions/annotation-runner-*.zip
          ide-versions: |
            ideaIC:2023.3
            ideaIC:2024.1
            ideaIC:2025.2
          failure-levels: |
            COMPATIBILITY_PROBLEMS
            INVALID_PLUGIN

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: annotation-runner-plugin
          path: build/distributions/*.zip
